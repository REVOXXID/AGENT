<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX | Commando Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f0f13;
            --bg-card: #1c1c22;
            --accent: #00ffcc;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --danger: #ff453a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); -webkit-font-smoothing: antialiased; padding-bottom: 80px; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; background: rgba(15, 15, 19, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        h1 { font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .container { padding: 20px; }
        .card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { font-size: 18px; margin-bottom: 15px; color: var(--text-main); border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #2a2a32; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 22px; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .stat-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; }

        /* Inputs & Buttons */
        textarea, input { width: 100%; background: #2a2a32; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; }
        button { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        button:active { opacity: 0.8; }
        
        /* Checklists */
        .check-item { display: flex; align-items: center; margin-bottom: 12px; padding: 10px; background: #2a2a32; border-radius: 8px; }
        .check-item input[type="checkbox"] { width: 20px; height: 20px; margin: 0 15px 0 0; accent-color: var(--accent); }
        .check-item label { font-size: 14px; flex-grow: 1; }

        /* Navigation Bottom */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-btn { background: none; color: var(--text-sub); border: none; font-size: 12px; flex-direction: column; align-items: center; display: flex; width: auto; padding: 5px; }
        .nav-btn.active { color: var(--accent); }

        /* Tabs */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* AI Response */
        #ai-response { background: #2a2a32; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; margin-top: 15px; display: none; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>APEX</h1>
    </header>

    <div class="container">
        
        <div id="tab-dash" class="tab-content active">
            <div class="card">
                <h2>Cible : Peau sur l'os</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Poids Actuel</div>
                        <div class="stat-value">75.3 kg</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Objectif</div>
                        <div class="stat-value">73.5 kg</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Body Fat %</div>
                        <div class="stat-value">14.0 %</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Cible BF %</div>
                        <div class="stat-value">11-12 %</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Hydratation (Objectif: 4.5L)</h2>
                <div class="check-item"><input type="checkbox" id="water1"><label for="water1">Matin : 1.5L + Citron</label></div>
                <div class="check-item"><input type="checkbox" id="water2"><label for="water2">Journée : 1.5L Pure</label></div>
                <div class="check-item"><input type="checkbox" id="water3"><label for="water3">Soir/Salle : 1.5L + Électrolytes</label></div>
            </div>
            
            <div class="card">
                <h2>ZMA Timer</h2>
                <p style="font-size: 14px; color: var(--text-sub); margin-bottom: 10px;">Dernier repas terminé à :</p>
                <input type="time" id="meal-time" style="width: auto; display: inline-block;">
                <button onclick="calculateZMA()" style="width: auto; padding: 10px 20px; margin-left: 10px;">Calculer</button>
                <p id="zma-result" style="margin-top: 15px; font-weight: bold; color: var(--accent);"></p>
            </div>
        </div>

        <div id="tab-coach" class="tab-content">
            <div class="card">
                <h2>Update APEX</h2>
                <p style="font-size: 12px; color: var(--text-sub); margin-bottom: 15px;">Heure salle, volume d'eau, fatigue, écarts...</p>
                <textarea id="ai-input" rows="5" placeholder="Ex: Salle à 22h, j'en suis à 2L d'eau, j'ai mangé un bout de pain à midi..."></textarea>
                <button onclick="callGemini()" id="btn-ai">Envoyer au Coach</button>
                <div id="ai-response"></div>
            </div>
        </div>

        <div id="tab-supps" class="tab-content">
            <div class="card">
                <h2>Matin / Petit-Déj</h2>
                <div class="check-item"><input type="checkbox"><label>2x Omega-3</label></div>
                <div class="check-item"><input type="checkbox"><label>2x Lion's Mane</label></div>
                <div class="check-item"><input type="checkbox"><label>1x Bacteria</label></div>
                <div class="check-item"><input type="checkbox"><label>1x Électrolyte</label></div>
                <div class="check-item"><input type="checkbox"><label>1x B-Complex</label></div>
                <div class="check-item"><input type="checkbox"><label>1x Ashwagandha</label></div>
                <div class="check-item"><input type="checkbox"><label>2x Biotine 1000ug</label></div>
            </div>

            <div class="card">
                <h2>Pré / Post Salle</h2>
                <div class="check-item"><input type="checkbox"><label>Pré: 1x Glucosamine</label></div>
                <div class="check-item"><input type="checkbox"><label>Pré: 1x Électrolyte</label></div>
                <div class="check-item"><input type="checkbox"><label>Post: Whey + 5g Créatine</label></div>
                <div class="check-item"><input type="checkbox"><label>Post: 3x Collagène Marin</label></div>
            </div>

            <div class="card">
                <h2>Nuit (Dîner & Coucher)</h2>
                <div class="check-item"><input type="checkbox"><label>Dîner: 1x Bacteria</label></div>
                <div class="check-item"><input type="checkbox"><label>Coucher: 2x ZMA (2h après repas)</label></div>
            </div>
        </div>

    </div>

    <nav>
        <button class="nav-btn active" onclick="switchTab('dash', this)">DASHBOARD</button>
        <button class="nav-btn" onclick="switchTab('coach', this)">COACH IA</button>
        <button class="nav-btn" onclick="switchTab('supps', this)">STACK</button>
    </nav>

    <script>
        // Navigation Tabs
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            btn.classList.add('active');
        }

        // ZMA Timer
        function calculateZMA() {
            const mealTime = document.getElementById('meal-time').value;
            if(!mealTime) return;
            let [hours, minutes] = mealTime.split(':').map(Number);
            hours = (hours + 2) % 24;
            const formattedTime = `${hours.toString().padStart(2, '0')}h${minutes.toString().padStart(2, '0')}`;
            document.getElementById('zma-result').innerText = `🚨 Prise du ZMA à : ${formattedTime}`;
        }

        // Gemini AI Call
        async function callGemini() {
            const input = document.getElementById('ai-input').value;
            const btn = document.getElementById('btn-ai');
            const responseDiv = document.getElementById('ai-response');
            
            if(!input) return;

            btn.innerText = "Calcul en cours...";
            btn.style.opacity = "0.5";
            responseDiv.style.display = "none";

            const apiKey = "AIzaSyAQfbkAH8-ho5IvOYSjw2Pt2XfUrgof6bA"; // Clé intégrée
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

            const systemPrompt = `Tu es APEX, coach strict. Cible: 73.5kg, 11-12% BF (Peau sur l'os). Règles: ZMA 2h après repas, Eau 4.5L/j. Si écart -> Salt Flush. L'utilisateur te donne ses updates. Réponds de façon militaire, courte, et donne le planning ajusté.`;

            const payload = {
                contents: [{ parts: [{ text: `Système: ${systemPrompt}\n\nUpdate du jour: ${input}` }] }]
            };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                
                responseDiv.innerText = text;
                responseDiv.style.display = "block";
            } catch (error) {
                responseDiv.innerText = "Erreur de connexion au QG. Vérifie le réseau.";
                responseDiv.style.display = "block";
            }

            btn.innerText = "Envoyer au Coach";
            btn.style.opacity = "1";
        }
    </script>
</body>
</html>
