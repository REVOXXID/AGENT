<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APEX | COMMAND CENTER</title>
    <style>
        :root {
            --bg-dark: #0a0a0c; --bg-card: #16161a; --bg-input: #222229;
            --accent: #00ffcc; --text-main: #ffffff; --text-sub: #8e8e93;
            --danger: #ff453a; --success: #32d74b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; }
        
        header { padding: 15px 20px; background: rgba(10, 10, 12, 0.9); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 20px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .badge { background: rgba(255, 69, 58, 0.2); color: var(--danger); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; border: 1px solid var(--danger); }

        .container { padding: 15px; }
        .card { background: var(--bg-card); border-radius: 14px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2a35; }
        h2 { font-size: 14px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }

        /* Progress Bar */
        .progress-container { background: #000; border-radius: 10px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; border: 1px solid #333; }
        .progress-bar { background: var(--accent); height: 100%; width: 0%; transition: width 0.3s ease; }
        
        /* Checklists */
        .check-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .check-item:last-child { border-bottom: none; }
        .check-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--accent); }
        .check-item label { font-size: 14px; flex-grow: 1; }

        /* Inputs */
        input[type="text"], input[type="number"], select { width: 100%; background: var(--bg-input); border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        button { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        button:active { opacity: 0.8; }

        /* Terminal IA */
        #ai-response { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-top: 15px; font-size: 13px; line-height: 1.5; color: var(--accent); display: none; white-space: pre-wrap; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; border-top: 1px solid #333; z-index: 100; }
        .nav-btn { flex: 1; padding: 15px 0; background: none; border: none; color: var(--text-sub); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); border-top: 2px solid var(--accent); }
        .tab { display: none; }
        .tab.active { display: block; }
    </style>
</head>
<body>

    <header>
        <h1>APEX<span style="color:white">V4</span></h1>
        <div class="badge">SALT FLUSH</div>
    </header>

    <div class="container">
        
        <div id="tab-routine" class="tab active">
            <div class="card">
                <h2>Hydratation (Objectif: 4.5L)</h2>
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span id="water-text">0 L</span>
                    <span>4.5 L</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="water-bar"></div>
                </div>
                <button onclick="addWater()" style="padding: 10px; font-size: 12px; background: #333; color: white;">+ Ajouter 0.5L</button>
            </div>

            <div class="card">
                <h2>1. Matin (Skincare & Supps)</h2>
                <div class="check-item"><input type="checkbox" id="chk-skin-am" onchange="saveChecks()"><label>Skincare: Cleanser + HA + CeraVe</label></div>
                <div class="check-item"><input type="checkbox" id="chk-supps-am" onchange="saveChecks()"><label>Stack: 2x Omega, 2x Lion, 1x Bact, 1x B-Comp, 1x Ashwa, 2x Biotine</label></div>
                <div class="check-item"><input type="checkbox" id="chk-water-am" onchange="saveChecks()"><label>Eau + 1/2 Citron bu</label></div>
            </div>

            <div class="card">
                <h2>2. Salle (Pré / Post)</h2>
                <div class="check-item"><input type="checkbox" id="chk-pre" onchange="saveChecks()"><label>Pré: 1x Glucosamine + 1x Électrolyte</label></div>
                <div class="check-item"><input type="checkbox" id="chk-post" onchange="saveChecks()"><label>Post: Whey + Creatine + 3x Collagène</label></div>
            </div>

            <div class="card">
                <h2>3. Nuit (Skincare & ZMA)</h2>
                <div class="check-item"><input type="checkbox" id="chk-skin-pm" onchange="saveChecks()"><label>Skincare: Salicylic + HA + CeraVe</label></div>
                <div class="check-item"><input type="checkbox" id="chk-zma" onchange="saveChecks()"><label>2x ZMA (2h après dîner)</label></div>
            </div>
            
            <button onclick="resetRoutine()" style="background: var(--danger); color: white;">Réinitialiser la journée</button>
        </div>

        <div id="tab-stats" class="tab">
            <div class="card">
                <h2>Évolution BF% (Cible: 11%)</h2>
                <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">14.0%</div>
                <svg viewBox="0 0 100 30" style="width: 100%; height: 60px; background: #000; border-radius: 8px; padding: 5px;">
                    <polyline points="0,5 25,12 50,18 75,25 100,28" fill="none" stroke="var(--accent)" stroke-width="2"/>
                </svg>
            </div>
            
            <div class="card">
                <h2>Calculateur 1RM (Densité)</h2>
                <input type="number" id="lift-weight" placeholder="Poids soulevé (kg)">
                <input type="number" id="lift-reps" placeholder="Répétitions max">
                <button onclick="calc1RM()">Calculer 1RM</button>
                <div id="rm-result" style="margin-top: 15px; font-size: 18px; font-weight: bold; color: var(--accent); text-align: center;"></div>
            </div>
        </div>

        <div id="tab-coach" class="tab">
            <div class="card">
                <h2>Update au Coach</h2>
                <input type="text" id="food-input" placeholder="Qu'as-tu mangé ? (Ex: Poulet, Asperges...)">
                <input type="text" id="gym-input" placeholder="Heure de la salle ? (Ex: 22h30)">
                <select id="cheat-input">
                    <option value="clean">Journée 100% Clean</option>
                    <option value="cheat">J'ai fait un écart (Sel/Cheat meal)</option>
                </select>
                <button onclick="callIA()" id="btn-ia">Demander Stratégie</button>
                <div id="ai-response"></div>
            </div>
        </div>

    </div>

    <nav>
        <button class="nav-btn active" onclick="switchTab('routine', this)">ROUTINE</button>
        <button class="nav-btn" onclick="switchTab('stats', this)">STATS</button>
        <button class="nav-btn" onclick="switchTab('coach', this)">COACH IA</button>
    </nav>

    <script>
        // --- GESTION DES ONGLETS ---
        function switchTab(id, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        // --- GESTION DE L'EAU & CHECKLISTS (LOCALSTORAGE) ---
        let water = parseFloat(localStorage.getItem('apexWater')) || 0;
        
        function updateWaterUI() {
            document.getElementById('water-text').innerText = water.toFixed(1) + " L";
            let percent = Math.min((water / 4.5) * 100, 100);
            document.getElementById('water-bar').style.width = percent + "%";
        }
        
        function addWater() {
            water += 0.5;
            localStorage.setItem('apexWater', water);
            updateWaterUI();
        }

        function saveChecks() {
            const checks = ['chk-skin-am', 'chk-supps-am', 'chk-water-am', 'chk-pre', 'chk-post', 'chk-skin-pm', 'chk-zma'];
            checks.forEach(id => {
                localStorage.setItem(id, document.getElementById(id).checked);
            });
        }

        function loadChecks() {
            const checks = ['chk-skin-am', 'chk-supps-am', 'chk-water-am', 'chk-pre', 'chk-post', 'chk-skin-pm', 'chk-zma'];
            checks.forEach(id => {
                document.getElementById(id).checked = (localStorage.getItem(id) === 'true');
            });
            updateWaterUI();
        }

        function resetRoutine() {
            if(confirm("Effacer la routine d'aujourd'hui ?")) {
                water = 0; localStorage.setItem('apexWater', 0);
                const checks = ['chk-skin-am', 'chk-supps-am', 'chk-water-am', 'chk-pre', 'chk-post', 'chk-skin-pm', 'chk-zma'];
                checks.forEach(id => { document.getElementById(id).checked = false; localStorage.setItem(id, false); });
                updateWaterUI();
            }
        }

        // --- CALCULATEUR 1RM ---
        function calc1RM() {
            let w = parseFloat(document.getElementById('lift-weight').value);
            let r = parseFloat(document.getElementById('lift-reps').value);
            if(w > 0 && r > 0) {
                let res = w * (1 + (r / 30));
                document.getElementById('rm-result').innerText = "1RM: " + res.toFixed(1) + " kg";
            }
        }

        // --- COACH IA (FIX DU 404) ---
        async function callIA() {
            const btn = document.getElementById('btn-ia');
            const resp = document.getElementById('ai-response');
            
            const food = document.getElementById('food-input').value || "Rien spécifié";
            const gym = document.getElementById('gym-input').value || "Non spécifiée";
            const cheat = document.getElementById('cheat-input').value;
            
            btn.innerText = "Analyse en cours...";
            resp.style.display = "block";
            resp.innerText = "> Connexion API en cours...";

            const apiKey = "AIzaSyAQfbkAH8-ho5IvOYSjw2Pt2XfUrgof6bA"; 
            // FIX MAJEUR: Utilisation de gemini-1.5-flash qui est le modèle public stable
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const prompt = `Tu es APEX, coach strict. 
            DONNÉES DU USER:
            - Eau bue: ${water}L (Cible: 4.5L)
            - Repas: ${food}
            - Salle: ${gym}
            - État: ${cheat === 'cheat' ? 'A fait un écart (Salt Flush requis)' : 'Clean'}
            
            Fais un bilan court et dis-lui ce qu'il doit faire pour le reste de la journée (Suppléments, ZMA timing, Eau). Sois direct et militaire.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || "Erreur API inconnue");
                }

                const data = await response.json();
                resp.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resp.innerText = `> ÉCHEC DE LA CONNEXION.\nRaison : ${e.message}\n\nVérifie que ta clé API est valide pour gemini-1.5-flash.`;
            }
            btn.innerText = "Demander Stratégie";
        }

        // Initialisation
        window.onload = loadChecks;
    </script>
</body>
</html>
